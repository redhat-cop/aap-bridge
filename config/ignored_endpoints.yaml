# Ignored Endpoints Configuration
# These endpoints are skipped during the prep phase (discovery + schema generation)

ignored_endpoints:
  # Common: Ignored for both source and target AAP instances
  common:
    - ping
    - config
    - me
    - dashboard
    - metrics
    - analytics
    - mesh_visualizer
    - bulk
    - settings
    - activity_stream
    - activitystream
    - service_index
    - receptor_addresses

  # Source-only: Ignored only for source AAP
  source: []

  # Target-only: Gateway platform endpoints not used by migration
  target:
    - app_urls
    - authenticator_maps
    - authenticator_plugins
    - authenticator_users
    - authenticators
    - ca_certificates
    - http_ports
    - routes
    - service_clusters
    - service_keys
    - service_nodes
    - service_types
    - services
    - session
    - status
    - trigger_definition
    - ui_auth
    - ui_plugin_routes
