---
# Regenerate aap-bridge configuration for an existing pair.
#
# Usage:
#   ansible-playbook playbooks/generate-bridge-config.yml \
#     -e source_version=2.3 \
#     -e target_version=2.6
#
- name: Generate aap-bridge configuration for pair
  hosts: localhost
  connection: local
  gather_facts: true

  tasks:
    - name: Generate bridge configuration
      ansible.builtin.include_role:
        name: pair_networking
      vars:
        source_version: "{{ source_version }}"
        target_version: "{{ target_version }}"
