---
# Run a source + target pair from existing golden images.
# Images must already be built (build-instance.yml) or pulled (pull-image.yml).
#
# Usage:
#   ansible-playbook playbooks/run-pair.yml \
#     -e source_version=2.3 \
#     -e target_version=2.6
#
#   # With a remote registry:
#   ansible-playbook playbooks/run-pair.yml \
#     -e source_version=2.3 \
#     -e target_version=2.6 \
#     -e image_registry=quay.io/myorg
#
- name: Run AAP migration test pair
  hosts: localhost
  connection: local
  gather_facts: true

  vars:
    pair_id: "{{ source_version | replace('.', '') }}-to-{{ target_version | replace('.', '') }}"

  tasks:
    - name: Load version matrix
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../versions/matrix.yml"

    - name: Verify source golden image exists
      ansible.builtin.command:
        cmd: "podman image exists {{ golden_image_prefix }}-{{ source_version }}:latest"
      changed_when: false

    - name: Verify target golden image exists
      ansible.builtin.command:
        cmd: "podman image exists {{ golden_image_prefix }}-{{ target_version }}:latest"
      changed_when: false

    - name: Create pair network
      ansible.builtin.command:
        cmd: "podman network create aap-pair-{{ pair_id }}"
      register: network_create
      failed_when: false
      changed_when: network_create.rc == 0

    - name: Ensure generated pair directory exists
      ansible.builtin.file:
        path: "{{ playbook_dir }}/../generated/pairs/{{ pair_id }}"
        state: directory
        mode: "0750"

    # --- Source ---
    - name: Start source container
      ansible.builtin.include_role:
        name: base_container
      vars:
        aap_version: "{{ source_version }}"
        role_suffix: "src"
        container_name: "aap-{{ source_version | replace('.', '') }}-src"

    - name: Set source API URL
      ansible.builtin.set_fact:
        src_api_port: "{{ '8443' if aap_versions[source_version].installer.method == 'containerized' else '443' }}"

    - name: Wait for source Controller API
      ansible.builtin.command:
        cmd: >
          podman exec aap-{{ source_version | replace('.', '') }}-src
            curl -sk -o /dev/null -w '%{http_code}'
            https://localhost:{{ src_api_port }}{{ aap_versions[source_version].api.controller_path }}/ping/
      register: src_api
      retries: 30
      delay: 10
      until: src_api.stdout | default('') == '200'
      changed_when: false
      failed_when: false

    - name: Populate source test data
      ansible.builtin.include_role:
        name: populate_test_data
      vars:
        aap_version: "{{ source_version }}"

    - name: Create source API token
      ansible.builtin.include_role:
        name: api_token
      vars:
        aap_version: "{{ source_version }}"
        container_name: "aap-{{ source_version | replace('.', '') }}-src"
        token_label: src

    # --- Target ---
    - name: Start target container
      ansible.builtin.include_role:
        name: base_container
      vars:
        aap_version: "{{ target_version }}"
        role_suffix: "tgt"
        container_name: "aap-{{ target_version | replace('.', '') }}-tgt"

    - name: Set target API URL
      ansible.builtin.set_fact:
        tgt_api_port: "{{ '8443' if aap_versions[target_version].installer.method == 'containerized' else '443' }}"

    - name: Wait for target Controller API
      ansible.builtin.command:
        cmd: >
          podman exec aap-{{ target_version | replace('.', '') }}-tgt
            curl -sk -o /dev/null -w '%{http_code}'
            https://localhost:{{ tgt_api_port }}{{ aap_versions[target_version].api.controller_path }}/ping/
      register: tgt_api
      retries: 30
      delay: 10
      until: tgt_api.stdout | default('') == '200'
      changed_when: false
      failed_when: false

    - name: Install target RW token from golden image
      ansible.builtin.include_role:
        name: pair_target_token
      vars:
        aap_version: "{{ target_version }}"

    # --- Generate bridge config ---
    - name: Generate bridge configuration
      ansible.builtin.include_role:
        name: pair_networking
      vars:
        source_version: "{{ source_version }}"
        target_version: "{{ target_version }}"

    - name: Register connections in bridge UI
      ansible.builtin.include_role:
        name: bridge_connections

    - name: Pair running
      ansible.builtin.debug:
        msg: |
          Pair {{ source_version }} -> {{ target_version }} is running!

          Source API: {{ 'UP' if src_api.stdout | default('') == '200' else 'NOT READY (may need more time)' }}
          Target API: {{ 'UP' if tgt_api.stdout | default('') == '200' else 'NOT READY (may need more time)' }}

          Run aap-bridge:
            make test-bridge SOURCE={{ source_version }} TARGET={{ target_version }}
            make shell-pair SOURCE={{ source_version }} TARGET={{ target_version }}

          Reset (instant, from golden images):
            make reset-pair SOURCE={{ source_version }} TARGET={{ target_version }}

          Shell access:
            make shell-src SOURCE={{ source_version }}
            make shell-tgt TARGET={{ target_version }}
