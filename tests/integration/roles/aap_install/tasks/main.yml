---
- name: Load version matrix
  ansible.builtin.include_vars:
    file: "{{ playbook_dir }}/../versions/matrix.yml"

- name: Set version config
  ansible.builtin.set_fact:
    ver_config: "{{ aap_versions[aap_version] }}"

- name: Check for subscription manifest
  ansible.builtin.find:
    paths: "{{ playbook_dir }}/../files/manifest"
    patterns: "*.zip"
  register: manifest_preflight

- name: Warn if no subscription manifest found
  ansible.builtin.debug:
    msg: >
      NOTE: No subscription manifest found in tests/integration/files/manifest/*.zip.
      The AAP instance will be unlicensed after install. See docs/developer-guide/testing.md
      for instructions on obtaining and placing a manifest file.
  when: manifest_preflight.files | length == 0

- name: Download installer bundle if needed
  ansible.builtin.include_tasks: download-bundle.yml

- name: Register RHEL subscription inside container
  ansible.builtin.command:
    cmd: >
      podman exec {{ container_name }}
        subscription-manager register
          --username={{ rhsm_username }}
          --password={{ rhsm_password }}
          --auto-attach
  register: rhsm_result
  retries: 10
  delay: 15
  until: >-
    rhsm_result.rc == 0 or
    'already registered' in (rhsm_result.stderr | default(''))
  changed_when: rhsm_result.rc == 0
  no_log: true
  when:
    - (rhsm_username | default('', true) | length) > 0
    - (rhsm_password | default('', true) | length) > 0

- name: Fail if RHEL subscription registration failed
  ansible.builtin.fail:
    msg: >-
      subscription-manager register failed in {{ container_name }} after 10 retries.
      Check RHSM credentials, subscription availability, and network connectivity to
      Red Hat (transient API errors are retried automatically).
  when:
    - (rhsm_username | default('', true) | length) > 0
    - (rhsm_password | default('', true) | length) > 0
    - rhsm_result.rc != 0
    - "'already registered' not in (rhsm_result.stderr | default(''))"

- name: Enable required repos
  ansible.builtin.command:
    cmd: "podman exec {{ container_name }} subscription-manager repos --enable={{ item }}"
  loop: "{{ ver_config.repos }}"
  when:
    - (rhsm_username | default('', true) | length) > 0
    - (rhsm_password | default('', true) | length) > 0

- name: Copy installer bundle into container
  ansible.builtin.command:
    cmd: "podman cp {{ bundle_file }} {{ container_name }}:/tmp/"

- name: Extract installer bundle
  ansible.builtin.command:
    cmd: >
      podman exec {{ container_name }}
        tar xzf /tmp/{{ bundle_filename }} -C /opt/

- name: Set installer directory from extracted bundle name
  ansible.builtin.set_fact:
    installer_dir: "/opt/{{ bundle_filename | regex_replace('\\.tar\\.gz$', '') }}"

- name: Verify installer directory exists in container
  ansible.builtin.command:
    cmd: "podman exec {{ container_name }} test -d {{ installer_dir }}"
  register: installer_dir_check
  changed_when: false

- name: Fail if installer directory is missing
  ansible.builtin.fail:
    msg: >
      Expected installer directory {{ installer_dir }} after extracting {{ bundle_filename }}.
      Check that the bundle archive extracts a top-level directory under /opt.
  when: installer_dir_check.rc != 0

- name: Get container hostname for installer inventory
  ansible.builtin.command:
    cmd: "podman exec {{ container_name }} hostname"
  register: container_hostname_result
  changed_when: false

- name: Set container hostname fact
  ansible.builtin.set_fact:
    container_hostname: "{{ container_hostname_result.stdout | trim }}"

- name: Generate installer inventory
  ansible.builtin.template:
    src: "{{ ver_config.inventory_template }}"
    dest: "/tmp/aap-inventory-{{ container_name }}"
    mode: "0644"

- name: Copy inventory into container
  ansible.builtin.command:
    cmd: >
      podman cp
        /tmp/aap-inventory-{{ container_name }}
        {{ container_name }}:{{ installer_dir }}/inventory

- name: Run AAP installer (RPM method)
  ansible.builtin.include_tasks: install-rpm.yml
  when: ver_config.installer.method == 'rpm'

- name: Run AAP installer (containerized method)
  ansible.builtin.include_tasks: install-containerized.yml
  when: ver_config.installer.method == 'containerized'

- name: Run post-install tasks
  ansible.builtin.include_tasks: post-install.yml
