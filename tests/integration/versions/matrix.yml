---
# AAP Version Matrix for Ephemeral Testing Environments
# Single source of truth for all version-specific parameters.

aap_versions:
  "1.0":
    display_name: "AAP 1.0"
    rhel_version: 8
    base_image: "registry.redhat.io/ubi8/ubi-init:latest"
    installer:
      method: rpm
      setup_script: "setup.sh"
      download_rhel_version: 7
      bundle_name: "ansible-tower-setup-bundle-3.6.2-1.tar.gz"
      bundle_prefix: "ansible-tower-setup-bundle"
      bundle_download_api: false
      ansible_pip_package: "ansible==2.9.27"
    components:
      controller:
        enabled: true
      hub:
        enabled: false
      eda:
        enabled: false
      gateway:
        enabled: false
    api:
      controller_path: "/api/v2"
    repos:
      - rhel-8-for-x86_64-baseos-rpms
      - rhel-8-for-x86_64-appstream-rpms
    resource_requirements:
      ram_gb: 10
      cpus: 4
    container:
      hostname_prefix: "aap10"
      privileged: true
    inventory_template: "inventory-tower.j2"

